# docker-compose.frontend.yml
# ─── EC2 #1: Frontend (Nginx) + Spring Boot API ───
# This runs on the lightweight EC2 instance.
# The Spring Boot API connects to the Rust gRPC server on EC2 #2.
#
# Usage:
#   GRPC_SERVER_HOST=<EC2-2-private-ip> docker compose -f docker-compose.frontend.yml up -d

version: '3.8'

services:
  # React frontend served via Nginx (port 80)
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - spring-boot-api
    restart: unless-stopped

  # Spring Boot REST API — bridges React frontend ↔ Rust gRPC server on EC2 #2
  spring-boot-api:
    build: ./spring-boot-api
    ports:
      - "8080:8080"
    environment:
      # Point to EC2 #2's private IP (override with: GRPC_SERVER_HOST=<ip> docker compose ... up)
      - GRPC_SERVER_HOST=${GRPC_SERVER_HOST:-172.31.47.90}
      - GRPC_SERVER_PORT=50051
    restart: unless-stopped
